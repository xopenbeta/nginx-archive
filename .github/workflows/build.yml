name: Build nginx for macOS / Linux / Windows

on:
  push:
    tags:
      - 'v*'

env:
  MACOS_DEPLOYMENT_TARGET: "12.0"
  PCRE2_VERSION: "10.45"
  OPENSSL_VERSION: "3.4.1"
  ZLIB_VERSION: "1.3.1"

jobs:
  build:
    name: nginx ${{ matrix.nginx_version }} (${{ matrix.platform.os }}-${{ matrix.platform.arch }})
    strategy:
      fail-fast: false
      matrix:
        nginx_version:
          - "1.26.3"
          - "1.28.3"
        platform:
          - { os: macos,   arch: arm64,   runner: macos-14,       brew_prefix: /opt/homebrew, brew_bin: /opt/homebrew/bin/brew }
          - { os: macos,   arch: x86_64,  runner: macos-14,       brew_prefix: /usr/local,    brew_bin: /usr/local/bin/brew    }
          - { os: linux,   arch: arm64,   runner: ubuntu-22.04-arm                                                             }
          - { os: linux,   arch: x86_64,  runner: ubuntu-22.04                                                                 }
          - { os: windows, arch: arm64,   runner: windows-2022                                                                }
          - { os: windows, arch: x86_64,  runner: windows-2022                                                                 }

    runs-on: ${{ matrix.platform.runner }}

    defaults:
      run:
        shell: ${{ matrix.platform.os == 'windows' && 'msys2 {0}' || 'bash' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── macOS ────────────────────────────────────────────────────────────────

      - name: "[macOS] Select Xcode 15.4"
        if: matrix.platform.os == 'macos'
        run: |
          XCODE_APP="/Applications/Xcode_15.4.app"
          if [ ! -d "${XCODE_APP}" ]; then
            echo "Expected Xcode not found: ${XCODE_APP}"
            exit 1
          fi
          echo "Selected Xcode: ${XCODE_APP}"
          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
          xcodebuild -version
          xcrun clang --version
          echo "DEVELOPER_DIR=${XCODE_APP}/Contents/Developer" >> "${GITHUB_ENV}"

      - name: "[macOS x86_64] Prepare Rosetta and x86_64 Homebrew"
        if: matrix.platform.os == 'macos' && matrix.platform.arch == 'x86_64'
        run: |
          softwareupdate --install-rosetta --agree-to-license || true

          if [ ! -x "/usr/local/bin/brew" ]; then
            NONINTERACTIVE=1 arch -x86_64 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi

          arch -x86_64 /usr/local/bin/brew --version

      - name: "[macOS] Install dependencies"
        if: matrix.platform.os == 'macos'
        run: |
          BREW_BIN="${{ matrix.platform.brew_bin }}"

          if [ ! -x "${BREW_BIN}" ]; then
            echo "Expected Homebrew not found: ${BREW_BIN}"
            exit 1
          fi

          brew_cmd() {
            if [ "${{ matrix.platform.arch }}" = "x86_64" ]; then
              arch -x86_64 "${BREW_BIN}" "$@"
            else
              "${BREW_BIN}" "$@"
            fi
          }

          brew_cmd update
          brew_cmd install openssl@3 pcre2 pkg-config

          {
            echo "BREW_PREFIX=${{ matrix.platform.brew_prefix }}"
            echo "BREW_BIN=${BREW_BIN}"
          } >> "${GITHUB_ENV}"

      - name: "[macOS] Sanitize environment"
        if: matrix.platform.os == 'macos'
        run: |
          echo "CPATH=" >> "${GITHUB_ENV}"
          echo "C_INCLUDE_PATH=" >> "${GITHUB_ENV}"
          echo "CPLUS_INCLUDE_PATH=" >> "${GITHUB_ENV}"

      - name: "[macOS] Resolve SDK path"
        if: matrix.platform.os == 'macos'
        run: |
          SDK_PATH="$(xcrun --sdk macosx --show-sdk-path)"
          echo "SDKROOT=${SDK_PATH}" >> "${GITHUB_ENV}"

      # ── Linux ─────────────────────────────────────────────────────────────────

      - name: "[Linux x86_64] Install dependencies"
        if: matrix.platform.os == 'linux' && matrix.platform.arch == 'x86_64'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential libssl-dev libpcre2-dev zlib1g-dev

      - name: "[Linux arm64] Install dependencies"
        if: matrix.platform.os == 'linux' && matrix.platform.arch == 'arm64'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential libssl-dev libpcre2-dev zlib1g-dev

      # ── Windows ───────────────────────────────────────────────────────────────

      - name: "[Windows x86_64] Setup MSYS2 MINGW64"
        if: matrix.platform.os == 'windows' && matrix.platform.arch == 'x86_64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            perl
            mingw-w64-x86_64-gcc

      - name: "[Windows arm64] Setup MSYS2 MINGW64 (cross-compile to arm64)"
        if: matrix.platform.os == 'windows' && matrix.platform.arch == 'arm64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            perl
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-lld

      # ── Source download (all platforms) ───────────────────────────────────────

      - name: Download nginx source
        run: |
          NGINX_VERSION="${{ matrix.nginx_version }}"
          curl -fSL -o "nginx-${NGINX_VERSION}.tar.gz" \
            "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"
          tar xzf "nginx-${NGINX_VERSION}.tar.gz"

      - name: "[nginx 1.26.3] Patch HTTP/2 GCC compatibility"
        if: matrix.nginx_version == '1.26.3'
        run: |
          SOURCE_FILE="nginx-${{ matrix.nginx_version }}/src/http/v2/ngx_http_v2_filter_module.c"

          perl -0pi -e 's/static const u_char nginx\[5\] = "\\x84\\xaa\\x63\\x55\\xe7";/static const u_char nginx[5] = { 0x84, 0xaa, 0x63, 0x55, 0xe7 };/g; s/static const u_char accept_encoding\[12\] =\n\s*"\\x8b\\x84\\x84\\x2d\\x69\\x5b\\x05\\x44\\x3c\\x86\\xaa\\x6f";/static const u_char accept_encoding[12] = {\n        0x8b, 0x84, 0x84, 0x2d, 0x69, 0x5b, 0x05, 0x44, 0x3c, 0x86, 0xaa, 0x6f\n    };/g' "${SOURCE_FILE}"

          sed -n '118,124p' "${SOURCE_FILE}"

      - name: "[Windows] Download PCRE2 source"
        if: matrix.platform.os == 'windows'
        run: |
          curl -fSL -o "pcre2-${PCRE2_VERSION}.tar.gz" \
            "https://github.com/PCRE2Project/pcre2/releases/download/pcre2-${PCRE2_VERSION}/pcre2-${PCRE2_VERSION}.tar.gz"
          tar xzf "pcre2-${PCRE2_VERSION}.tar.gz"

      - name: "[Windows] Download OpenSSL source"
        if: matrix.platform.os == 'windows'
        run: |
          curl -fSL -o "openssl-${OPENSSL_VERSION}.tar.gz" \
            "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz"
          tar xzf "openssl-${OPENSSL_VERSION}.tar.gz"

      - name: "[Windows arm64] Patch OpenSSL mingwarm64 target"
        if: matrix.platform.os == 'windows' && matrix.platform.arch == 'arm64'
        run: |
          OPENSSL_CONFIG="openssl-${OPENSSL_VERSION}/Configurations/10-main.conf"

          if [ ! -f "${OPENSSL_CONFIG}" ]; then
            echo "Expected OpenSSL config not found: ${OPENSSL_CONFIG}"
            exit 1
          fi

          if grep -q '"mingwarm64"' "${OPENSSL_CONFIG}"; then
            echo "OpenSSL target mingwarm64 already exists"
            exit 0
          fi

          awk '
            /#### UEFI/ && !patched {
              print "    \"mingwarm64\" => {"
              print "        inherit_from     => [ \"mingw-common\" ],"
              print "        cflags           => \"\"," 
              print "        sys_id           => \"MINGWARM64\"," 
              print "        bn_ops           => add(\"SIXTY_FOUR_BIT\"),"
              print "        asm_arch         => '\''aarch64'\'',"
              print "        uplink_arch      => '\''armv8'\'',"
              print "        perlasm_scheme   => \"win64\"," 
              print "        shared_rcflag    => \"\"," 
              print "        multilib         => \"-arm64\"," 
              print "    },"
              print ""
              patched = 1
            }
            { print }
          ' "${OPENSSL_CONFIG}" > "${OPENSSL_CONFIG}.tmp"

          mv "${OPENSSL_CONFIG}.tmp" "${OPENSSL_CONFIG}"
          grep -n 'mingwarm64' "${OPENSSL_CONFIG}"

      - name: "[Windows] Download zlib source"
        if: matrix.platform.os == 'windows'
        run: |
          curl -fSL -o "zlib-${ZLIB_VERSION}.tar.gz" \
            "https://github.com/madler/zlib/releases/download/v${ZLIB_VERSION}/zlib-${ZLIB_VERSION}.tar.gz"
          tar xzf "zlib-${ZLIB_VERSION}.tar.gz"

      # ── Configure ─────────────────────────────────────────────────────────────

      - name: "[macOS] Configure"
        if: matrix.platform.os == 'macos'
        run: |
          NGINX_VERSION="${{ matrix.nginx_version }}"
          TARGET_ARCH="${{ matrix.platform.arch }}"
          BREW_BIN="${BREW_BIN}"
          BREW_PREFIX="${BREW_PREFIX}"

          brew_cmd() {
            if [ "${TARGET_ARCH}" = "x86_64" ]; then
              arch -x86_64 "${BREW_BIN}" "$@"
            else
              "${BREW_BIN}" "$@"
            fi
          }

          OPENSSL_PREFIX="$(brew_cmd --prefix openssl@3)"
          PCRE2_PREFIX="$(brew_cmd --prefix pcre2)"
          CC="$(xcrun --find clang)"
          SDK_PATH="${SDKROOT}"
          INSTALL_DIR="nginx-${NGINX_VERSION}-macos-${TARGET_ARCH}"

          echo "INSTALL_DIR=${INSTALL_DIR}" >> "${GITHUB_ENV}"
          echo "PACKAGE_EXT=tar.gz"         >> "${GITHUB_ENV}"

          CC_OPT="-arch ${TARGET_ARCH} --sysroot=${SDK_PATH} -mmacosx-version-min=${MACOS_DEPLOYMENT_TARGET} -I${OPENSSL_PREFIX}/include -I${PCRE2_PREFIX}/include"
          LD_OPT="-arch ${TARGET_ARCH} --sysroot=${SDK_PATH} -mmacosx-version-min=${MACOS_DEPLOYMENT_TARGET} -L${OPENSSL_PREFIX}/lib -L${PCRE2_PREFIX}/lib"

          cd "nginx-${NGINX_VERSION}"

          "./configure" \
            --prefix="/${INSTALL_DIR}" \
            --with-cc="${CC}" \
            --with-cc-opt="${CC_OPT}" \
            --with-ld-opt="${LD_OPT}" \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_realip_module \
            --with-http_stub_status_module \
            --with-http_gzip_static_module \
            --with-http_sub_module \
            --with-stream \
            --with-stream_ssl_module

      - name: "[Linux x86_64] Configure"
        if: matrix.platform.os == 'linux' && matrix.platform.arch == 'x86_64'
        run: |
          NGINX_VERSION="${{ matrix.nginx_version }}"
          INSTALL_DIR="nginx-${NGINX_VERSION}-linux-x86_64"

          echo "INSTALL_DIR=${INSTALL_DIR}" >> "${GITHUB_ENV}"
          echo "PACKAGE_EXT=tar.gz"         >> "${GITHUB_ENV}"

          cd "nginx-${NGINX_VERSION}"

          "./configure" \
            --prefix="/${INSTALL_DIR}" \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_realip_module \
            --with-http_stub_status_module \
            --with-http_gzip_static_module \
            --with-http_sub_module \
            --with-stream \
            --with-stream_ssl_module

      - name: "[Linux arm64] Configure"
        if: matrix.platform.os == 'linux' && matrix.platform.arch == 'arm64'
        run: |
          NGINX_VERSION="${{ matrix.nginx_version }}"
          INSTALL_DIR="nginx-${NGINX_VERSION}-linux-arm64"

          echo "INSTALL_DIR=${INSTALL_DIR}" >> "${GITHUB_ENV}"
          echo "PACKAGE_EXT=tar.gz"         >> "${GITHUB_ENV}"

          cd "nginx-${NGINX_VERSION}"

          "./configure" \
            --prefix="/${INSTALL_DIR}" \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_realip_module \
            --with-http_stub_status_module \
            --with-http_gzip_static_module \
            --with-http_sub_module \
            --with-stream \
            --with-stream_ssl_module

      - name: "[Windows] Configure"
        if: matrix.platform.os == 'windows'
        run: |
          NGINX_VERSION="${{ matrix.nginx_version }}"
          PCRE2_SOURCE_DIR="../pcre2-${PCRE2_VERSION}"
          OPENSSL_SOURCE_DIR="../openssl-${OPENSSL_VERSION}"
          ZLIB_SOURCE_DIR="../zlib-${ZLIB_VERSION}"
          TARGET_ARCH="${{ matrix.platform.arch }}"
          INSTALL_DIR="nginx-${NGINX_VERSION}-windows-${TARGET_ARCH}"

          if [ ! -d "pcre2-${PCRE2_VERSION}" ]; then
            echo "Expected PCRE2 source not found: pcre2-${PCRE2_VERSION}"
            exit 1
          fi

          if [ ! -d "openssl-${OPENSSL_VERSION}" ]; then
            echo "Expected OpenSSL source not found: openssl-${OPENSSL_VERSION}"
            exit 1
          fi

          if [ ! -d "zlib-${ZLIB_VERSION}" ]; then
            echo "Expected zlib source not found: zlib-${ZLIB_VERSION}"
            exit 1
          fi

          if [ "${TARGET_ARCH}" = "arm64" ]; then
            CROSS_TARGET="aarch64-w64-mingw32"
            CC="clang"
            AR="llvm-ar"
            RANLIB="llvm-ranlib"
            WINDRES="llvm-windres"
            COMMON_CFLAGS="--target=${CROSS_TARGET} -fuse-ld=lld -I/clangarm64/include"
            COMMON_LDFLAGS="--target=${CROSS_TARGET} -fuse-ld=lld -L/clangarm64/lib"

            export CHOST="${CROSS_TARGET}"
            export CC
            export AR
            export RANLIB
            export WINDRES
            export RC="${WINDRES}"
            export CFLAGS="${COMMON_CFLAGS}"
            export LDFLAGS="${COMMON_LDFLAGS}"

            CC_OPT="${COMMON_CFLAGS}"
            LD_OPT="${COMMON_LDFLAGS}"
            OPENSSL_OPT="mingwarm64 no-shared no-tests no-apps no-makedepend no-asm"
            PCRE2_OPT="--host=${CROSS_TARGET} --disable-shared --enable-static --disable-jit"
            ZLIB_OPT="--static"

            echo "CC=${CC}"
            echo "CHOST=${CHOST}"
            echo "AR=${AR}"
            echo "RANLIB=${RANLIB}"
            echo "CFLAGS=${CFLAGS}"
            echo "LDFLAGS=${LDFLAGS}"
            echo "OPENSSL_OPT=${OPENSSL_OPT}"
            echo "PCRE2_OPT=${PCRE2_OPT}"
            echo "ZLIB_OPT=${ZLIB_OPT}"
          else
            CC="gcc"
            CC_OPT="-I/mingw64/include"
            LD_OPT="-L/mingw64/lib"
            OPENSSL_OPT="mingw64 no-shared no-tests no-apps no-makedepend"
            PCRE2_OPT="--disable-shared --enable-static"
            ZLIB_OPT="--static"
          fi

          echo "INSTALL_DIR=${INSTALL_DIR}" >> "${GITHUB_ENV}"
          echo "PACKAGE_EXT=zip"            >> "${GITHUB_ENV}"

          cd "nginx-${NGINX_VERSION}"

          "./configure" \
            --prefix="/${INSTALL_DIR}" \
            --with-cc="${CC}" \
            --with-pcre="${PCRE2_SOURCE_DIR}" \
            --with-pcre-opt="${PCRE2_OPT}" \
            --with-openssl="${OPENSSL_SOURCE_DIR}" \
            --with-zlib="${ZLIB_SOURCE_DIR}" \
            --with-zlib-opt="${ZLIB_OPT}" \
            --with-openssl-opt="${OPENSSL_OPT}" \
            --with-cc-opt="${CC_OPT}" \
            --with-ld-opt="${LD_OPT}" \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_realip_module \
            --with-http_stub_status_module \
            --with-http_gzip_static_module \
            --with-http_sub_module

      # ── Build (all platforms) ─────────────────────────────────────────────────

      - name: Build
        run: |
          if [ "${{ matrix.platform.os }}" = "macos" ]; then
            JOBS="$(sysctl -n hw.logicalcpu)"
          elif [ "${{ matrix.platform.os }}" = "windows" ]; then
            JOBS="${NUMBER_OF_PROCESSORS:-4}"
          else
            JOBS="$(nproc)"
          fi

          cd "nginx-${{ matrix.nginx_version }}"
          make -j"${JOBS}"

      # ── Package ───────────────────────────────────────────────────────────────

      - name: "[Linux/macOS] Package"
        if: matrix.platform.os != 'windows'
        run: |
          NGINX_VERSION="${{ matrix.nginx_version }}"
          cd "nginx-${NGINX_VERSION}"
          rm -rf "${GITHUB_WORKSPACE}/stage"
          make install DESTDIR="${GITHUB_WORKSPACE}/stage"

          cd "${GITHUB_WORKSPACE}/stage"
          tar czf "${GITHUB_WORKSPACE}/${INSTALL_DIR}.tar.gz" "${INSTALL_DIR}"

          cd "${GITHUB_WORKSPACE}"
          shasum -a 256 "${INSTALL_DIR}.tar.gz" > "${INSTALL_DIR}.tar.gz.sha256"

      - name: "[Windows] Package"
        if: matrix.platform.os == 'windows'
        run: |
          NGINX_VERSION="${{ matrix.nginx_version }}"
          cd "nginx-${NGINX_VERSION}"
          rm -rf "${GITHUB_WORKSPACE}/stage"
          make install DESTDIR="${GITHUB_WORKSPACE}/stage"

          cd "${GITHUB_WORKSPACE}/stage"
          # Use PowerShell to create .zip
          powershell -Command "Compress-Archive -Path '${INSTALL_DIR}' -DestinationPath '${GITHUB_WORKSPACE}/${INSTALL_DIR}.zip'"

          cd "${GITHUB_WORKSPACE}"
          sha256sum "${INSTALL_DIR}.zip" > "${INSTALL_DIR}.zip.sha256"

      # ── Upload artifact ────────────────────────────────────────────────────────

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nginx-${{ matrix.nginx_version }}-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          path: |
            nginx-${{ matrix.nginx_version }}-${{ matrix.platform.os }}-${{ matrix.platform.arch }}.tar.gz
            nginx-${{ matrix.nginx_version }}-${{ matrix.platform.os }}-${{ matrix.platform.arch }}.tar.gz.sha256
            nginx-${{ matrix.nginx_version }}-${{ matrix.platform.os }}-${{ matrix.platform.arch }}.zip
            nginx-${{ matrix.nginx_version }}-${{ matrix.platform.os }}-${{ matrix.platform.arch }}.zip.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nginx-*/nginx-*.tar.gz
            nginx-*/nginx-*.tar.gz.sha256
            nginx-*/nginx-*.zip
            nginx-*/nginx-*.zip.sha256
          generate_release_notes: true
